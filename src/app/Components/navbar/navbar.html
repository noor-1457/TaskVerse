<nav class="fixed top-0 left-0 w-full z-50 shadow-md transition-colors duration-300 bg-gray-900">
  <div class="max-w-7xl mx-auto px-4 md:px-6 py-3 flex items-center justify-between">
    <a
      class="text-xl font-extrabold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-pink-500"
    >
      Task Verse
    </a>

    <ul class="hidden lg:flex space-x-8">
      @for (item of navItems; track item.name) {
        <li
          class="text-[#8F00FF] font-medium relative group cursor-pointer"
          [routerLink]="item.link"
        >
          {{ item.name }}
          <span
            class="absolute left-0 bottom-0 w-0 h-0.5 bg-[#8F00FF] transition-all duration-300 group-hover:w-full"
          ></span>
        </li>
      }
    </ul>
    <!-- Hamburger Button -->
    <button class="md:hidden flex p-4 cursor-pointer bg-gray-900 text-white" (click)="toggleMenu()">
      <lucide-icon [img]="LucideMenu" [size]="24"></lucide-icon>
    </button>

    <!-- Mobile Menu -->
    @if (isMenuOpen) {
      <div class="mobile-menu md:hidden absolute top-full left-0 w-full bg-gray-900 shadow-lg">
        <ul class="flex flex-col p-4 space-y-2">
          @for (item of navItems; track item.name) {
            <li
              class="text-[#8F00FF] font-medium relative group cursor-pointer py-2"
              [routerLink]="item.link"
              (click)="isMenuOpen = false"
            >
              {{ item.name }}
              <span
                class="absolute left-0 bottom-0 w-0 h-0.5 bg-[#8F00FF] transition-all duration-300 group-hover:w-full"
              ></span>
            </li>
          }
        </ul>
      </div>
    }
  </div>
</nav>
